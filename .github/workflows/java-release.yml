name: Release Java bindings

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Select signing key
        id: select_signing_key
        run: |
          set -euo pipefail
          SIGNING_FPR=$(gpg --list-secret-keys --with-colons \
            | awk -F: '($1=="sec" || $1=="ssb") && $12 ~ /[sS]/ { getline; if ($1=="fpr") { print $10; exit } }')
          if [ -z "$SIGNING_FPR" ]; then
            echo "No signing-capable secret key found in the keyring." >&2
            exit 1
          fi
          echo "signing_fpr=$SIGNING_FPR" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        working-directory: java
        run: mvn --no-transfer-progress --batch-mode deploy -P ci-cd -Dgpg.keyname=${{ steps.select_signing_key.outputs.signing_fpr }}
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
