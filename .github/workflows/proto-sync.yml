name: Proto Sync

# Keeps this repo's gtfs-realtime.proto -- and all generated bindings -- in step
# with the canonical proto in google/transit. Runs on a schedule; when upstream
# has changed, it syncs the proto, regenerates every binding, and opens a PR.
# (Addresses #59 and #143.)

on:
  schedule:
    # Mondays at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_PROTO_URL: https://raw.githubusercontent.com/google/transit/master/gtfs-realtime/proto/gtfs-realtime.proto

jobs:
  sync:
    name: Sync proto and regenerate bindings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream gtfs-realtime.proto
        run: curl -fsSL "$UPSTREAM_PROTO_URL" -o gtfs-realtime.proto

      - name: Detect proto changes
        id: proto
        run: |
          if git diff --quiet gtfs-realtime.proto; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "gtfs-realtime.proto is already in sync with upstream."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream proto changed:"
            git --no-pager diff gtfs-realtime.proto
          fi

      - name: Regenerate all bindings
        if: steps.proto.outputs.changed == 'true'
        run: ./codegen/generate.sh

      - name: Open pull request
        if: steps.proto.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automated/proto-sync
          base: master
          title: 'chore: sync gtfs-realtime.proto from upstream and regenerate bindings'
          commit-message: 'chore: sync gtfs-realtime.proto and regenerate all bindings'
          labels: |
            automated
            proto-sync
          body: |
            ## Automated proto sync

            The upstream [`gtfs-realtime.proto`](https://github.com/google/transit/blob/master/gtfs-realtime/proto/gtfs-realtime.proto)
            changed. This PR syncs it into the repo and regenerates **every**
            language binding via `codegen/generate.sh`.

            ### Before merging
            - [ ] Review the proto diff for breaking vs. additive changes.
            - [ ] Bump the affected per-language package versions.
            - [ ] Confirm the `Bindings CI` checks pass.

            > Generated by the `proto-sync` workflow.
