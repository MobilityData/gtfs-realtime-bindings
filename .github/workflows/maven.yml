# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
    paths:
      - 'java/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Deploy with Maven
        working-directory: ./java
        run: |
          # Import the private key directly in this step so it is guaranteed to be in the keyring
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEYNAME=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          echo "Signing with GPG key: $GPG_KEYNAME"
          mvn -B clean deploy -Pci-cd \
            -Dgpg.keyname="$GPG_KEYNAME" \
            -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}