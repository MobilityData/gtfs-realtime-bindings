name: Node.js Release to npm

on:
  push:
    branches: [master]
    paths:
      - 'nodejs/**'
      - 'gtfs-realtime.proto'
  workflow_dispatch:

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: nodejs/package-lock.json

      - name: Install dependencies
        working-directory: nodejs
        run: npm ci

      - name: Run tests
        working-directory: nodejs
        run: npm test

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT_VERSION=$(python3 -c "import json; print(json.load(open('nodejs/package.json'))['version'])")
          PUBLISHED_VERSION=$(npm view gtfs-realtime-bindings version 2>/dev/null || echo "0.0.0")
          echo "Current version:   $CURRENT_VERSION"
          echo "Published version: $PUBLISHED_VERSION"
          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT_VERSION is already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version $CURRENT_VERSION will be published."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        working-directory: nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
