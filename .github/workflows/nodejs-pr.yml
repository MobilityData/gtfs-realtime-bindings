name: Node.js PR Checks

on:
  pull_request:
    paths:
      - 'nodejs/**'
      - '.github/workflows/nodejs-pr.yml'

env:
  node_version: '22'

jobs:
  test:
    name: Run Node.js tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
          cache: 'npm'
          cache-dependency-path: nodejs/package-lock.json

      - name: Install dependencies
        working-directory: nodejs
        run: npm ci

      - name: Run tests
        working-directory: nodejs
        run: npm test

  check_version_bump:
    name: Check version bump in package.json
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:nodejs/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          PR_VERSION=$(python3 -c "import json; print(json.load(open('nodejs/package.json'))['version'])")
          echo "Base version: $BASE_VERSION"
          echo "PR version:   $PR_VERSION"
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::Version in nodejs/package.json was not bumped (still $PR_VERSION). Please bump the version."
            exit 1
          fi
