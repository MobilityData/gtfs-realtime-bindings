name: Python test

on:
  pull_request:
    paths:
      - python/**
      - '.github/workflows/python-pr.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: check_version_bump
    strategy:
      matrix:
        python-version: [3.8, 3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          echo '--- python dir ---'
          ls -la python || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (make google.transit importable)
        run: |
          python -m pip install -U pip
          python -m pip install -e .
        working-directory: python

      - name: Verify package install (debug)
        run: |
          python -c "import sys; print('sys.executable:', sys.executable); import pkgutil; print('pkgutil.find_loader(\"google.transit\")=', pkgutil.find_loader('google.transit'))"
        working-directory: python

      - name: Install runtime/test deps
        run: |
          python -m pip install protobuf pytest
        working-directory: python

      - name: Run tests
        run: |
          pytest -q tests
        working-directory: python

  check_version_bump:
    name: Check version bump in pyproject.toml
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get base branch
        run: |
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV

      - name: Fetch base branch
        run: |
          git fetch origin ${{ env.BASE_REF }}

      - name: Compare version in pyproject.toml
        run: |
          PR_VERSION=$(grep '^version' python/pyproject.toml | head -1 || true)
          BASE_VERSION=$(git show origin/${{ env.BASE_REF }}:python/pyproject.toml | grep '^version' | head -1 || true)
          echo "PR version: $PR_VERSION"
          echo "Base version: $BASE_VERSION"
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::warning file=python/pyproject.toml,line=1,title=pyproject.toml version::Version in python/pyproject.toml was not bumped"
          fi